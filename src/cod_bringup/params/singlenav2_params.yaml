      static_layer:  # 静态地图图层配置
        plugin: "nav2_costmap_2d::StaticLayer"  # 使用的插件类名
        map_subscribe_transient_local: True  # 是否使用瞬态本地订阅（接收历史地图）
        enable: true  # 是否启用该图层
