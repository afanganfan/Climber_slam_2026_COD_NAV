        transform_tolerance: 0.2  # seconds；容差阈值
        mapping_mode: false  # 是否启用建图模式（非导航）
        map_save_duration: 60.0  # default 60s, how often to autosave；持续时间（秒）
        observation_sources: livox_source realsense_source  # 传感器源名称列表
        livox_source:  # Livox 点云源配置
          data_type: PointCloud2  # 数据类型
          topic:  /livox/lidar_filtered  # 数据话题名
          transport_type: "raw"  # default raw -No compression-, Options: zlib, draco, zstd；数据传输格式
          marking: true  # 是否标记障碍物
          clearing: true  # 是否清除障碍物

          obstacle_range: 8.0  # 量程范围（米）
          raytrace_range: 9.0  # 量程范围（米）

          min_obstacle_height: 0.15  # default 0, meters；最小值限制
          max_obstacle_height: 1.0  # defaule 3, meters；最大值限制
          expected_update_rate: 0.0  # default 0, if not updating at this rate at least, remove from buffer；更新频率（Hz）
          observation_persistence: 0.0  # 传感器观测保留时间（秒）
          inf_is_valid: false  # 是否将无穷远读数视为有效
          clear_after_reading: true  # 读取后是否清空传感器缓存
          filter: "voxel"  # 点云预处理滤波方式
          voxel_min_points: 0  # 体素最小点数阈值
          model_type: 1  # 传感器模型类型
          vertical_fov_angle: 2.00  # 垂直视场角（弧度）
          vertical_fov_offset: 0.0  # 垂直视场偏移（弧度）
          horizontal_fov_angle: 6.28  # 水平视场角（弧度）
        realsense_source:  # RealSense 点云源配置
          enabled: true  # 是否启用
          data_type: PointCloud2  # 数据类型
          topic: /camera/camera/depth/color/points  # 数据话题名
          transport_type: "raw"  # 数据传输格式
          marking: true  # 是否标记障碍物
          clearing: true  # 是否清除障碍物
          obstacle_range: 3.0  # 量程范围（米）
          raytrace_range: 3.5  # 量程范围（米）
          min_z: 0.15  # 最小值限制
          max_z: 3.5  # 最大值限制
          min_obstacle_height: 0.18  # 最小值限制
          max_obstacle_height: 1.5  # 最大值限制
          #expected_update_rate: 15.0    #相机掉线时及时告警
          clear_after_reading: true  # 读取后是否清空传感器缓存
          filter: "voxel"  # 点云预处理滤波方式
          voxel_min_points: 0  # 体素最小点数阈值
          vertical_fov_angle: 1.01  # D435i垂直FOV 58° ≈ 1.01 rad
          vertical_fov_offset: 0.0  # 垂直视场偏移（弧度）
          horizontal_fov_angle: 1.52  # D435i水平FOV 87° ≈ 1.52 rad
          decay_acceleration: 1.  # 障碍体素衰减加速度系数
          model_type: 0  # 传感器模型类型
      always_send_full_costmap: False  # 是否发布完整代价地图

map_server:  # 地图服务配置
  ros__parameters:  # ROS 参数集合
    use_sim_time: False  # 是否使用仿真时间
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: "/home/nucshao/Climber_slam_2026_NAV/src/cod_bringup/maps/2025new1.yaml"  # 地图 YAML 文件路径

map_saver:  # 地图保存服务配置
  ros__parameters:  # ROS 参数集合
    use_sim_time: False  # 是否使用仿真时间
    save_map_timeout: 5.0  # 超时时间（秒）
    free_thresh_default: 0.25  # 保存地图时空闲区域阈值
    occupied_thresh_default: 0.65  # 保存地图时占用区域阈值
    map_subscribe_transient_local: True  # 是否使用瞬态本地订阅（接收历史地图）

planner_server:  # 全局路径规划服务配置
  ros__parameters:  # ROS 参数集合
    use_sim_time: false  # 是否使用仿真时间
    expected_planner_frequency: 10.0  # 运行频率（Hz）
    planner_plugins: ["GridBased"]  # 规划器插件列表
    GridBased:  # Smac 网格规划器配置
      plugin: "nav2_smac_planner/SmacPlanner2D"  # 使用的插件类名
      tolerance: 0.5  # 如果无法到达精确位置的规划容差，单位：米
      allow_unknown: true  # 允许在未知空间中行驶
      downsample_costmap: false  # 是否对地图进行下采样
      downsampling_factor: 1  # 代价地图层分辨率的倍数 (e.g. 2 on a 5cm costmap would be 10cm)
      max_iterations: 1000000  # 搜索的最大总迭代次数（如果无法到达），设置为-1以禁用
      max_on_approach_iterations: 1000  # 一旦在容差范围内，尝试到达目标的最大迭代次数
      max_planning_time: 4.5  # 规划、平滑和上采样的最大时间（秒）。将根据规划后的剩余时间缩放最大平滑和上采样时间。
      cost_travel_multiplier: 4.0  # For 2D: 应用于搜索的代价乘数，以避开高代价区域。较大的值将更精确地放置在通道的中心（如果存在非“FREE”代价势场），但计算时间稍长。为了优化速度，1.0是合理的值。合理的折衷值是2.0。0.0的值有效地禁用避开障碍物的功能，像一个简单的二进制搜索A*。
      motion_model_for_search: "DUBIN"  # 规划搜索使用的运动模型
      angle_quantization_bins: 72  # For Hybrid nodes: 搜索的角度桶数，对于2D节点必须为1（无角度搜索）
      analytic_expansion_ratio: 3.5  # For Hybrid/Lattice nodes: 在搜索过程中尝试解析扩展的比例，用于最终接近。
      analytic_expansion_max_length: 3.0  # For Hybrid/Lattice nodes: 解析扩展被认为有效的最大长度，以防止不安全的捷径（单位：米）。这应该与最小转弯半径成比例，不应小于最小半径的4-5倍。
      minimum_turning_radius: 0.05  # For Hybrid/Lattice nodes: 路径/车辆的最小转弯半径，单位：米
      retrospective_penalty: 0.025  # For Hybrid/Lattice nodes: 优先考虑路径上较晚的机动而不是较早的机动。节省搜索时间，因为较早的节点不会被扩展，直到有必要。必须 >= 0.0且 <= 1.0
      reverse_penalty: 1.0  # For Reeds-Shepp model: 应用于倒车的惩罚，必须 >= 1
      change_penalty: 0.0  # For Hybrid nodes: 应用于改变方向的惩罚，必须 >= 0
      non_straight_penalty: 0.0  # For Hybrid nodes: 应用于非直线运动的惩罚，必须 >= 1
      cost_penalty: 2.0  # For Hybrid nodes: 在将更高代价区域添加到障碍物地图动态规划距离扩展启发式时应用的惩罚。这将驱动机器人更靠近通道的中心。1.3 - 3.5 之间的值是合理的。
      rotation_penalty: 5.0  # For Lattice node: 仅在使用包含原地旋转原语的最小控制集时应用于纯原地旋转命令的惩罚。除非严格必要用于避开障碍物，否则应始终设置足够高的权重，以避免此操作，否则可能会在路径中频繁出现不连续的情况，要求机器人原地旋转以节省路径距离。
      lookup_table_size: 20.0  # For Hybrid nodes: 缓存的dubin/reeds-sheep距离窗口的大小，单位：米。
      cache_obstacle_heuristic: True  # For Hybrid nodes: 在同一目标位置的后续重新规划之间缓存障碍物地图动态规划距离扩展启发式。如果代价地图基本静态，则显著加快重新规划性能（40倍）。
      allow_reverse_expansion: True  # For Lattice node: 是否在前向原语或反向扩展状态格子图中扩展，将使每一步的分支因子加倍。
      smooth_path: True  # For Lattice/Hybrid nodes: 是否平滑路径，对于2D节点始终为 true。
      smoother:  # 路径平滑器配置
        max_iterations: 10000  # 最大值限制
        w_smooth: 0.4  # 平滑器平滑项权重
        w_data: 0.1  # 平滑器数据项权重
        tolerance: 1.0e-10  # 允许误差阈值
        do_refinement: true  # 是否执行二次细化

smoother_server:  # 路径平滑服务配置
  ros__parameters:  # ROS 参数集合
    costmap_topic: global_costmap/costmap_raw  # 相关话题名
    footprint_topic: global_costmap/published_footprint  # 相关话题名
    robot_base_frame: base_link  # 机器人基座坐标系
    transform_tolerance: 0.1  # 容差阈值
    smoother_plugins: ["savitzky_golay_smoother"]  # 平滑器插件列表
    savitzky_golay_smoother:  # Savitzky-Golay 平滑器配置
      plugin: "nav2_smoother::SavitzkyGolaySmoother"  # 使用的插件类名
      window_size: 7  # 平滑窗口大小（点数）
      poly_order: 3  # 平滑器多项式阶数
      do_refinement: True  # 是否执行二次细化
      refinement_num: 2  # 细化迭代次数
      enforce_path_inversion: True  # 是否保留路径中的前后向切换点

behavior_server:  # 恢复与行为服务配置
  ros__parameters:  # ROS 参数集合
    use_sim_time: false  # 是否使用仿真时间
    local_costmap_topic: local_costmap/costmap_raw  # 相关话题名
    global_costmap_topic: global_costmap/costmap_raw  # 相关话题名
    local_footprint_topic: local_costmap/published_footprint  # 相关话题名
    global_footprint_topic: global_costmap/published_footprint  # 相关话题名
    cycle_frequency: 10.0  # 运行频率（Hz）
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]  # 行为插件列表
    spin:  # 原地旋转行为配置
        plugin: "nav2_behaviors/Spin"  # 使用的插件类名
    backup:  # 后退行为配置
        plugin: "pb_nav2_behaviors/BackUpFreeSpace"  # 使用的插件类名
    drive_on_heading:  # 定向直行行为配置
        plugin: "nav2_behaviors/DriveOnHeading"  # 使用的插件类名
    wait:  # 等待行为配置
        plugin: "nav2_behaviors/Wait"  # 使用的插件类名
    assisted_teleop:  # 辅助遥控行为配置
        plugin: "nav2_behaviors/AssistedTeleop"  # 使用的插件类名
    local_frame: odom  # 局部坐标系名称
    global_frame: map  # 全局坐标系名称
    robot_base_frame: base_link  # 机器人基座坐标系
    transform_tolerance: 0.1  # 容差阈值
    simulate_ahead_time: 2.0  # 行为仿真前瞻时间（秒）
    max_rotational_vel: 1.0  # 最大值限制
    min_rotational_vel: 0.4  # 最小值限制
    rotational_acc_lim: 3.2  # 最大角加速度限制（rad/s^2）
    # params for pb_nav2_behaviors/BackUpFreeSpace
    robot_radius: 0.1  # 半径参数（米）
    max_radius: 3.5  # 半径参数（米）
    service_name: "global_costmap/get_costmap"  # 调用的代价地图服务名
    free_threshold: 5  # 判定自由区域的阈值
    visualize: True  # 是否开启可视化

robot_state_publisher:  # 机器人状态发布节点配置
  ros__parameters:  # ROS 参数集合
    use_sim_time: False  # 是否使用仿真时间

waypoint_follower:  # 航点跟随节点配置
  ros__parameters:  # ROS 参数集合
    use_sim_time: False  # 是否使用仿真时间
    loop_rate: 20  # 更新频率（Hz）
    stop_on_failure: false  # 遇到航点失败时是否停止任务
    waypoint_task_executor_plugin: "wait_at_waypoint"  # 航点任务执行器名称
    wait_at_waypoint:  # 航点等待执行器配置
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"  # 使用的插件类名
      enabled: True  # 是否启用
      waypoint_pause_duration: 200  # 持续时间（秒）

velocity_smoother:  # 速度平滑节点配置
  ros__parameters:  # ROS 参数集合
    smoothing_frequency: 30.0  # 运行频率（Hz）
    scale_velocities: False  # 是否按比例缩放速度
    feedback: "CLOSED_LOOP"  # 闭环速度反馈，按里程计修正减速与制动
    max_velocity: [2.5, 2.5, 2.5]  # 与 MPPI 限速一致，不再截断高速输出
    min_velocity: [-2.5, -2.5, -2.5]  # 最小值限制
    deadband_velocity: [0.05, 0.05, 0.05]  # 速度死区（低于该值视为0）
    velocity_timeout: 1.0  # 超时时间（秒）
    max_accel: [2.5, 2.5, 1.5]  # 与 MPPI 加速度一致
    max_decel: [-3.5, -3.5, -3.0]  # 与 MPPI 制动一致
    odom_topic: "Odometry"  # 里程计话题名
    odom_duration: 0.1  # 持续时间（秒）

amcl:  # AMCL 定位节点配置
  ros__parameters:  # ROS 参数集合
    use_sim_time: False  # 是否使用仿真时间
    alpha1: 0.2  # 旋转到旋转的噪声参数 (rad/rad)
    alpha2: 0.2  # 旋转到平移的噪声参数 (m/rad)
    alpha3: 0.2  # 平移到旋转的噪声参数 (rad/m)
    alpha4: 0.2  # 平移到平移的噪声参数 (m/m)
    alpha5: 0.2  # 平移到平移的噪声参数 (m/m)
    base_frame_id: "base_link"  # 机器人基座坐标系
    set_initial_pose: true  # 启动时自动设置初始位姿，避免 AMCL 等待手动初始化
    initial_pose.x: 0.0  # 初始位姿 X (m)
    initial_pose.y: 0.0  # 初始位姿 Y (m)
    initial_pose.z: 0.0  # 初始位姿 Z (m)
    initial_pose.yaw: 0.0  # 初始偏航角 (rad)
    beam_skip_distance: 0.5  # 光束跳过距离 (m)
    beam_skip_error_threshold: 0.9  # 光束跳过误差阈值
    beam_skip_threshold: 0.3  # 光束跳过阈值
    do_beamskip: false  # 是否启用光束跳过
    global_frame_id: "map"  # 全局地图坐标系
    lambda_short: 0.1  # 短测距衰减系数
    laser_likelihood_max_dist: 2.0  # 激光似然字段最大距离 (m)
    laser_max_range: 20.0  # 激光最大测量范围 (m)
    laser_min_range: -1.0  # 激光最小测量范围 (m)
    laser_model_type: "likelihood_field"  # 激光模型类型 (likelihood_field 或 beam)
    max_beams: 100  # 每次扫描使用的最大激光束数
    max_particles: 2000  # 最大粒子数
    min_particles: 500  # 最小粒子数
    odom_frame_id: "odom"  # 里程计坐标系
    pf_err: 0.05  # 粒子滤波器误差阈值
    pf_z: 0.99  # 粒子滤波置信参数
    recovery_alpha_fast: 0.0  # 快速恢复参数 (均匀分布混合率)
    recovery_alpha_slow: 0.0  # 慢速恢复参数 (均匀分布混合率)
    resample_interval: 1  # 重采样间隔 (扫描数)
    robot_model_type: "nav2_amcl::OmniMotionModel"  # 机器人运动模型 (全向运动模型)
    save_pose_rate: 0.5  # 保存姿态的频率 (Hz)
    sigma_hit: 0.2  # 激光测量命中的标准差 (m)
    tf_broadcast: true  # 是否广播tf变换
    transform_tolerance: 1.0  # 变换容差 (s)
    update_min_a: 0.2  # 更新时最小旋转 (rad)
    update_min_d: 0.25  # 更新时最小平移 (m)
    z_hit: 0.5  # 命中部分的混合权重
    z_max: 0.05  # 最大范围部分的混合权重
    z_rand: 0.5  # 随机部分的混合权重
    z_short: 0.05  # 短距离部分的混合权重
    scan_topic: scan  # 激光扫描话题名称

amcl_map_client:  # AMCL 地图客户端配置
  ros__parameters:  # ROS 参数集合
    use_sim_time: False  # 是否使用仿真时间

amcl_rclcpp_node:  # AMCL 底层通信节点配置
  ros__parameters:  # ROS 参数集合
    use_sim_time: False  # 是否使用仿真时间
