      stvl_voxel_layer:  # 时空体素障碍层配置
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"  # 使用的插件类名
        enabled: true  # 是否启用
        voxel_decay: 0.5  # 体素障碍衰减时间常数
        decay_model: 0  # 体素衰减模型（0线性，1指数，2常驻）
        voxel_size: 0.05  # 体素尺寸（米）
        track_unknown_space: true  # 是否将未知区域纳入地图
