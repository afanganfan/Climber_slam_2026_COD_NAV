controller_server:
  ros__parameters:
    use_sim_time: False  # 是否使用仿真时钟
    controller_frequency: 50.0  # 控制器运行频率(Hz)
    min_x_velocity_threshold: 0.001  # x方向最小速度阈值
    min_y_velocity_threshold: 0.001  # y方向最小速度阈值
    min_theta_velocity_threshold: 0.001  # 角速度最小阈值
    failure_tolerance: 0.3  # 允许的失败容忍度
    progress_checker_plugin: "progress_checker"  # 进度检查器插件名
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]  # 控制器插件列表
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"  # 插件类型/类名
      required_movement_radius: 0.1  # 判定有进展的最小位移半径
      movement_time_allowance: 999.0  # 允许无进展的最长时间(s)
    general_goal_checker:
      stateful: True  # 是否启用状态保持
      plugin: "nav2_controller::SimpleGoalChecker"  # 插件类型/类名
      xy_goal_tolerance: 0.30 #放宽到25cm，高速omni机器人10cm太严导致绕圈
      yaw_goal_tolerance: 6.28  # 到点yaw容差(rad)
    FollowPath:
      plugin: "goal_approach_controller::GoalApproachController"  # 插件类型/类名
      inner_plugin: "nav2_mppi_controller::MPPIController"  # 内层控制器插件
      approach_distance: 0.5  # 更靠近目标再开始限速，减少提前收速
      approach_velocity: 0.2  # 接近目标阶段限速(m/s)
      direct_approach_distance: 0.22  # 更靠近目标才切直驱，优先保持沿路径接近
      direct_approach_exit_distance: 0.36  # 直驱退出阈值（滞回），防止模式反复切换
      direct_approach_kp: 1.05  # 近目标P增益小幅提高，避免末端“拖着走”
      max_approach_angular_velocity: 0.25  # 近目标角速度上限，抑制绕圈
      time_steps: 80  #增加到80，预测时域4.8s，让MPPI能看到冲过目标的后果
      model_dt: 0.06  #稍微放大步长，配合time_steps延长预测时域
      batch_size: 1500 #控制器的采样数。

      vx_std: 0.35 #增大采样多样性，让MPPI能采到更多减速/停止轨迹
      vy_std: 0.35  # y速度采样标准差
      wz_std: 0.2  # 角速度采样标准差

      vx_max: 2.5  # x最大速度
      vy_max: 2.5  # y最大速度
      wz_max: 1.5  # 最大角速度

      vx_min: -2.5  # x最小速度
      vy_min: -2.5  # y最小速度
      wz_min: -1.5  # 最小角速度

      ax_max: 1.5 #加速度提高，高速时能快速响应
      ay_max: 1.5  # y最大加速度
      az_max: 3.0  # 最大角加速度

      ax_min: -3.5 #关键：制动力必须对称，高速下刹得住
      ay_min: -3.5  # y最小加速度(制动)
      az_min: -3.0  # 最小角加速度(制动)

      iteration_count: 1  # 每周期优化迭代次数
      prune_distance: 1.7 #高速下提前剪枝已通过的路径点
      transform_tolerance: 0.1  # TF变换容忍时间(s)
      temperature: 0.25 #大幅降低：让 MPPI 更果断选最优轨迹，不在次优之间摇摆
      gamma: 0.015 #稍微提高正则化，减少激进抖动
      motion_model: "Omni" #控制器的运动模型。
      visualize: false #是否可视化。
      reset_period: 0.08 # (only in Humble)
      retry_attempt_limit: 2 #软重置的尝试次数
      regenerate_noises: true  # 是否每次重生成噪声
      TrajectoryVisualizer:
        trajectory_step: 5 #是指在可视化轨迹时，每隔多少个轨迹点绘制一个点。
        time_step: 3 #是指在可视化轨迹时，每隔多少个时间步长绘制一个点。
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "PathFollowCritic", "PathAlignCritic", "ObstaclesCritic"]  # 代价评估器列表

      ConstraintCritic:
        enabled: true  # 是否启用该模块
        cost_power: 1  # 代价幂指数
        cost_weight: 4.0  # 代价权重

      GoalCritic: #必须开启，否则机器人没有到达目标的动力
        enabled: true  # 是否启用该模块
        cost_power: 1  # 代价幂指数
        cost_weight: 20.0 #配合二次惩罚适当调整权重
        threshold_to_consider: 3.0  # 开始生效的距离阈值

      ObstaclesCritic: #开启提供额外的障碍物排斥力
        enabled: true  # 是否启用该模块
        cost_power: 1  # 代价幂指数
        repulsion_weight: 1.5 #排斥权重
        critical_weight: 20.0 #近距离障碍物惩罚
        consider_footprint: false #用圆形近似，omni机器人更高效
        collision_cost: 10000.0  # 碰撞代价值
        collision_margin_distance: 0.25 #碰撞边界余量
        near_goal_distance: 0.1  # 近目标区域距离阈值(m)

      CostCritic: #通过 costmap 梯度引导避障
        enabled: true  # 是否启用该模块
        cost_power: 1  # 代价幂指数
        cost_weight: 3.8 #适当降低，配合修正后的 inflation 梯度
        critical_cost: 253.0 #关键修正！只有 inscribed/lethal 才触发碰撞惩罚，不再把整个膨胀区都当碰撞
        consider_footprint: true  # 是否使用足迹碰撞模型
        collision_cost: 1000000.0  # 碰撞代价值
        near_goal_distance: 0.5  # 近目标区域距离阈值(m)
        trajectory_point_step: 2  # 轨迹采样步长

      PathFollowCritic: #必须开启，这是防止乱跑的核心
        enabled: true  # 是否启用该模块
        cost_power: 1  # 代价幂指数
        cost_weight: 8.0  # 代价权重
        offset_from_furthest: 5 #关注路径前方更远的点
        threshold_to_consider: 3.0 #缩小关闭距离，让路径跟随一直引导到接近目标，防止圆周运动

      PathAlignCritic: #让轨迹方向与路径对齐，高速下更平滑
        enabled: true  # 是否启用该模块
        cost_power: 1  # 代价幂指数
        cost_weight: 15.0  # 代价权重
        max_path_occupancy_ratio: 0.05  # 路径占用率上限
        trajectory_point_step: 4  # 轨迹采样步长
        threshold_to_consider: 3.0 #与PathFollowCritic同步，在接近目标前持续提供方向引导
        offset_from_furthest: 20  # 相对最远点的偏移量
        use_path_orientations: false #omni机器人用运动方向而非朝向

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 20.0  # 更新频率(Hz)
      publish_frequency: 20.0  # 发布频率(Hz)
      global_frame: odom  # 全局参考坐标系
      robot_base_frame: base_link  # 机器人基座坐标系
      use_sim_time: False  # 是否使用仿真时钟
      rolling_window: true  # 是否使用滚动窗口
      width: 10  # 地图宽度(m)
      height: 10  # 地图高度(m)
      resolution: 0.05  # 栅格分辨率(m)
      robot_radius: 0.2  # 机器人半径(m)
      footprint: "[ [0.15, 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15] ]"  # 机器人足迹轮廓
      plugins: ["static_layer","stvl_voxel_layer","inflation_layer"]  # 插件层列表
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"  # 插件类型/类名
        map_subscribe_transient_local: True  # 是否使用瞬态本地订阅
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"  # 插件类型/类名
        cost_scaling_factor: 5.0 #关键修正！原0.3衰减太慢，整个膨胀区代价都极高，MPPI没有梯度可用。5.0让代价快速衰减，形成清晰的"远离障碍物"梯度
        inflation_radius: 0.75 #加大膨胀半径，高速下需要更早看到障碍物
      stvl_voxel_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"  # 插件类型/类名
        enabled: true  # 是否启用该模块
        voxel_decay: 1.0     #seconds if linear, e^n if exponential
        decay_model: 0      #0=linear, 1=exponential, 2=persistent
        voxel_size: 0.05   #meters
        track_unknown_space: true   #default space is unknown
        observation_persistence: 0.5  #seconds
        max_obstacle_height: 2.0    #meters
        mark_threshold: 0      #voxel height
        update_footprint_enabled: true  # 是否更新足迹
        combination_method: 1      #1=max, 0=override
        obstacle_range: 3.0    #meters
        origin_z: 0.0    #meters
        publish_voxel_map: false   # default off
        transform_tolerance: 0.2    # seconds
        mapping_mode: false  # default off, saves map not for navigation
        map_save_duration: 60.0     #default 60s, how often to autosave
        observation_sources: livox_source realsense_source  # 观测源列表
        livox_source:
          data_type: PointCloud2  # 数据类型
          topic:  /livox/lidar_filtered  # 话题名
          transport_type: "raw"        #default raw -No compression-, Options: zlib, draco, zstd
          marking: true  # 是否标记障碍物
          clearing: true  # 是否清除障碍物

          obstacle_range: 8.0  # 障碍物探测范围(m)
          raytrace_range: 9.0  # 射线清除范围(m)

          min_obstacle_height: 0.4     #default 0, meters
          max_obstacle_height: 1.0     #defaule 3, meters
          expected_update_rate: 0.0    #default 0, if not updating at this rate at least, remove from buffer
          observation_persistence: 0.0 #default 0, use all measurements taken during now-value, 0=latest
          inf_is_valid: false          #default false, for laser scans
          clear_after_reading: true    #default false, clear the buffer after the layer gets readings from it
          filter: "voxel"              #default passthrough, apply "voxel", "passthrough", or no filter to sensor data, recommended to have at one filter on
          voxel_min_points: 0          #default 0, minimum points per voxel for voxel filter
          model_type: 1  # 传感器模型类型
          vertical_fov_angle: 2.00      #default 0.7, radians
          vertical_fov_offset: 0.0  # 垂直视场偏移(rad)
          horizontal_fov_angle: 6.28  # 水平视场角(rad)
        realsense_source:
          enabled: true  # 是否启用该模块
          data_type: PointCloud2  # 数据类型
          topic: /camera/camera/depth/color/points  # 话题名
          transport_type: "raw"  # 传输类型
          marking: true  # 是否标记障碍物
          clearing: true  # 是否清除障碍物
          obstacle_range: 3.0          #meters, 424x240低分辨率有效探测距离
          raytrace_range: 3.5          #meters, 清除射线范围略大于obstacle_range
          min_z: 0.1                  #meters, 过滤地面
          max_z: 3.5                   #meters, 低分辨率超过3.5m精度差
          min_obstacle_height: 0.1    #meters, 最低障碍物高度
          max_obstacle_height: 1.5     #meters, 哨兵高度以上不关心
          #expected_update_rate: 15.0    #相机掉线时及时告警
          clear_after_reading: true    #高频输入及时清除缓冲
          filter: "voxel"              #降采样减少处理量
          voxel_min_points: 0  # 体素最少点数
          vertical_fov_angle: 1.01     #D435i垂直FOV 58° ≈ 1.01 rad
          vertical_fov_offset: 0.0  # 垂直视场偏移(rad)
          horizontal_fov_angle: 1.52   #D435i水平FOV 87° ≈ 1.52 rad
          decay_acceleration: 1.  # 衰减加速度参数
          model_type: 0                #depth camera
      always_send_full_costmap: True  # 是否总是发送完整代价地图


