map_server:
  ros__parameters:
    use_sim_time: False  # 是否使用仿真时钟
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""  # 地图yaml文件路径

map_saver:
  ros__parameters:
    use_sim_time: False  # 是否使用仿真时钟
    save_map_timeout: 5.0  # 保存地图超时时间(s)
    free_thresh_default: 0.25  # 空闲栅格阈值
    occupied_thresh_default: 0.65  # 占用栅格阈值
    map_subscribe_transient_local: True  # 是否使用瞬态本地订阅

planner_server:
  ros__parameters:
    use_sim_time: false  # 是否使用仿真时钟
    expected_planner_frequency: 10.0  # 规划器期望频率(Hz)
    planner_plugins: ["GridBased"]  # 规划器插件列表
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"  # 插件类型/类名
      tolerance: 0.5                      # 如果无法到达精确位置的规划容差，单位：米
      allow_unknown: true                 # 允许在未知空间中行驶
      downsample_costmap: false           # 是否对地图进行下采样
      downsampling_factor: 1              # 代价地图层分辨率的倍数 (e.g. 2 on a 5cm costmap would be 10cm)
      max_iterations: 1000000             # 搜索的最大总迭代次数（如果无法到达），设置为-1以禁用
      max_on_approach_iterations: 1000    # 一旦在容差范围内，尝试到达目标的最大迭代次数
      max_planning_time: 4.5              # 规划、平滑和上采样的最大时间（秒）。将根据规划后的剩余时间缩放最大平滑和上采样时间。
      cost_travel_multiplier: 4.0         # For 2D: 应用于搜索的代价乘数，以避开高代价区域。较大的值将更精确地放置在通道的中心（如果存在非“FREE”代价势场），但计算时间稍长。为了优化速度，1.0是合理的值。合理的折衷值是2.0。0.0的值有效地禁用避开障碍物的功能，像一个简单的二进制搜索A*。
      motion_model_for_search: "DUBIN"    # For Hybrid Dubin, Redds-Shepp
      angle_quantization_bins: 72         # For Hybrid nodes: 搜索的角度桶数，对于2D节点必须为1（无角度搜索）
      analytic_expansion_ratio: 3.5       # For Hybrid/Lattice nodes: 在搜索过程中尝试解析扩展的比例，用于最终接近。
      analytic_expansion_max_length: 3.0  # For Hybrid/Lattice nodes: 解析扩展被认为有效的最大长度，以防止不安全的捷径（单位：米）。这应该与最小转弯半径成比例，不应小于最小半径的4-5倍。
      minimum_turning_radius: 0.05        # For Hybrid/Lattice nodes: 路径/车辆的最小转弯半径，单位：米
      retrospective_penalty: 0.025        # For Hybrid/Lattice nodes: 优先考虑路径上较晚的机动而不是较早的机动。节省搜索时间，因为较早的节点不会被扩展，直到有必要。必须 >= 0.0且 <= 1.0
      reverse_penalty: 1.0                # For Reeds-Shepp model: 应用于倒车的惩罚，必须 >= 1
      change_penalty: 0.0                 # For Hybrid nodes: 应用于改变方向的惩罚，必须 >= 0
      non_straight_penalty: 0.0          # For Hybrid nodes: 应用于非直线运动的惩罚，必须 >= 1
      cost_penalty: 2.0                   # For Hybrid nodes: 在将更高代价区域添加到障碍物地图动态规划距离扩展启发式时应用的惩罚。这将驱动机器人更靠近通道的中心。1.3 - 3.5 之间的值是合理的。
      rotation_penalty: 5.0               # For Lattice node: 仅在使用包含原地旋转原语的最小控制集时应用于纯原地旋转命令的惩罚。除非严格必要用于避开障碍物，否则应始终设置足够高的权重，以避免此操作，否则可能会在路径中频繁出现不连续的情况，要求机器人原地旋转以节省路径距离。
      lookup_table_size: 20.0             # For Hybrid nodes: 缓存的dubin/reeds-sheep距离窗口的大小，单位：米。
      cache_obstacle_heuristic: True      # For Hybrid nodes: 在同一目标位置的后续重新规划之间缓存障碍物地图动态规划距离扩展启发式。如果代价地图基本静态，则显著加快重新规划性能（40倍）。
      allow_reverse_expansion: True      # For Lattice node: 是否在前向原语或反向扩展状态格子图中扩展，将使每一步的分支因子加倍。
      smooth_path: True                   # For Lattice/Hybrid nodes: 是否平滑路径，对于2D节点始终为 true。
      smoother:
        max_iterations: 10000  # 最大搜索迭代次数
        w_smooth: 0.4  # 参数：w smooth
        w_data: 0.1  # 参数：w data
        tolerance: 1.0e-10  # 到达容差(m)
        do_refinement: true  # 是否二次细化

smoother_server:
  ros__parameters:
    costmap_topic: global_costmap/costmap_raw  # 参数：costmap topic
    footprint_topic: global_costmap/published_footprint  # 参数：footprint topic
    robot_base_frame: base_link  # 机器人基座坐标系
    transform_tolerance: 0.1  # TF变换容忍时间(s)
    smoother_plugins: ["savitzky_golay_smoother"]  # 平滑器插件列表
    savitzky_golay_smoother:
      plugin: "nav2_smoother::SavitzkyGolaySmoother"  # 插件类型/类名
      window_size: 7  # 平滑窗口大小
      poly_order: 3  # 拟合多项式阶数
      do_refinement: True  # 是否二次细化
      refinement_num: 2  # 细化次数
      enforce_path_inversion: True  # 是否强制处理路径反向段

behavior_server:
  ros__parameters:
    use_sim_time: true  # 是否使用仿真时钟
    local_costmap_topic: local_costmap/costmap_raw  # 局部代价地图话题
    global_costmap_topic: global_costmap/costmap_raw  # 全局代价地图话题
    local_footprint_topic: local_costmap/published_footprint  # 局部足迹话题
    global_footprint_topic: global_costmap/published_footprint  # 全局足迹话题
    cycle_frequency: 10.0  # 行为树运行频率(Hz)
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]  # 行为插件列表
    spin:
        plugin: "nav2_behaviors/Spin"  # 插件类型/类名
    backup:
        plugin: "pb_nav2_behaviors/BackUpFreeSpace"  # 插件类型/类名
    drive_on_heading:
        plugin: "nav2_behaviors/DriveOnHeading"  # 插件类型/类名
    wait:
        plugin: "nav2_behaviors/Wait"  # 插件类型/类名
    assisted_teleop:
        plugin: "nav2_behaviors/AssistedTeleop"  # 插件类型/类名
    local_frame: odom  # 局部参考坐标系
    global_frame: map  # 全局参考坐标系
    robot_base_frame: base_link  # 机器人基座坐标系
    transform_tolerance: 0.1  # TF变换容忍时间(s)
    simulate_ahead_time: 2.0  # 前向仿真时长(s)
    max_rotational_vel: 1.0  # 最大旋转速度(rad/s)
    min_rotational_vel: 0.4  # 最小旋转速度(rad/s)
    rotational_acc_lim: 3.2  # 旋转加速度限制(rad/s^2)
    # params for pb_nav2_behaviors/BackUpFreeSpace
    robot_radius: 0.2  # 机器人半径(m)
    max_radius: 3.5  # 最大搜索半径(m)
    service_name: "global_costmap/get_costmap"  # 调用服务名
    free_threshold: 5  # 空闲判定阈值
    visualize: True  # 是否发布可视化信息

robot_state_publisher:
  ros__parameters:
    use_sim_time: False  # 是否使用仿真时钟

waypoint_follower:
  ros__parameters:
    use_sim_time: False  # 是否使用仿真时钟
    loop_rate: 20  # 循环频率(Hz)
    stop_on_failure: false  # 失败时是否停止任务
    waypoint_task_executor_plugin: "wait_at_waypoint"  # 航点任务执行器插件
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"  # 插件类型/类名
      enabled: True  # 是否启用该模块
      waypoint_pause_duration: 200  # 航点停留时长(ms)

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 30.0  # 速度平滑频率(Hz)
    scale_velocities: False  # 是否按比例缩放速度
    feedback: "OPEN_LOOP"  # 速度反馈模式
    max_velocity: [2.5, 2.5, 2.5] #与控制器限速一致，不再截断高速输出
    min_velocity: [-2.5, -2.5, -2.5]  # 最小速度下限[x,y,w]
    deadband_velocity: [0.05, 0.05, 0.05]  # 速度死区[x,y,w]
    velocity_timeout: 1.0  # 速度指令超时时间(s)
    max_accel: [2.5, 2.5, 3.0] #与控制器加速度一致
    max_decel: [-3.5, -3.5, -3.0] #与控制器制动一致
    odom_topic: "Odometry"  # 里程计话题名
    odom_duration: 0.1  # 里程计缓存时长(s)
